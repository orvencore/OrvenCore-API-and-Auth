services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://orvencore:orvencore@postgres:5432/orvencore
      JWT_SECRET_KEY: change-me-for-local-compose
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 15
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 30
      CORS_ORIGINS: http://127.0.0.1:8000,http://localhost:8000
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orvencore
      POSTGRES_USER: orvencore
      POSTGRES_PASSWORD: orvencore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orvencore -d orvencore"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:

